# docker-compose.yml — Development / Staging
# Production: use docker-compose.prod.yml

version: "3.9"

x-api-env: &api-env
  DATABASE_URL: postgresql+asyncpg://rubymine:${POSTGRES_PASSWORD:-rubymine}@rubymine-postgres:5432/rubymine
  REDIS_URL: redis://:${REDIS_PASSWORD:-}@rubymine-redis:6379/0
  ARQ_REDIS_URL: redis://:${REDIS_PASSWORD:-}@rubymine-redis:6379/1
  SECRET_KEY: ${SECRET_KEY}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
  TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-rubymine_bot}
  TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-}
  TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-}
  TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
  CORS_ORIGINS: ${CORS_ORIGINS:-}
  TESTING: ${TESTING:-false}
  ENABLE_API_DOCS: ${ENABLE_API_DOCS:-false}
  CDN_BASE_URL: ${CDN_BASE_URL:-}
  UPLOAD_ROOT: uploads
  GLOBAL_RTP_TARGET: ${GLOBAL_RTP_TARGET:-75}
  CASE_OPEN_RATE_LIMIT: ${CASE_OPEN_RATE_LIMIT:-10/minute}
  BATTLE_CREATE_RATE_LIMIT: ${BATTLE_CREATE_RATE_LIMIT:-5/minute}
  BATTLE_ACTION_RATE_LIMIT: ${BATTLE_ACTION_RATE_LIMIT:-30/minute}
  # Payment providers
  PAYME_MERCHANT_ID: ${PAYME_MERCHANT_ID:-}
  PAYME_SECRET_KEY: ${PAYME_SECRET_KEY:-}
  CLICK_MERCHANT_ID: ${CLICK_MERCHANT_ID:-}
  CLICK_SECRET_KEY: ${CLICK_SECRET_KEY:-}
  # Crypto wallets
  CRYPTO_WALLET_TRC20: ${CRYPTO_WALLET_TRC20:-}
  CRYPTO_WALLET_TON: ${CRYPTO_WALLET_TON:-}
  CRYPTO_WALLET_ERC20: ${CRYPTO_WALLET_ERC20:-}
  USER_RISK_HIGH_THRESHOLD: ${USER_RISK_HIGH_THRESHOLD:-75.0}

x-worker-base: &worker-base
  build: .
  restart: unless-stopped
  depends_on:
    rubymine-postgres:
      condition: service_healthy
    rubymine-redis:
      condition: service_healthy
    rubymine-api:
      condition: service_healthy
  environment:
    <<: *api-env
  volumes:
    - uploads:/app/uploads
    - logs:/app/logs
  networks:
    - rubymine-net

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  rubymine-postgres:
    image: postgres:16-alpine
    container_name: rubymine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rubymine
      POSTGRES_USER: rubymine
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - rubymine-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rubymine -d rubymine"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  rubymine-redis:
    image: redis:7-alpine
    container_name: rubymine-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    networks:
      - rubymine-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI ─────────────────────────────────────────────────────────────────
  rubymine-api:
    build: .
    container_name: rubymine-api
    restart: unless-stopped
    depends_on:
      rubymine-postgres:
        condition: service_healthy
      rubymine-redis:
        condition: service_healthy
    environment:
      <<: *api-env
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    networks:
      - rubymine-net
    ports:
      - "8000:8000"
    command: ["bash", "docker/scripts/start.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ── Nginx ───────────────────────────────────────────────────────────────────
  rubymine-nginx:
    image: nginx:1.25-alpine
    container_name: rubymine-nginx
    restart: unless-stopped
    depends_on:
      rubymine-api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/websocket.conf:/etc/nginx/conf.d/websocket.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - uploads:/app/uploads:ro
      - logs:/var/log/nginx
    networks:
      - rubymine-net

  # ── Economy Worker ──────────────────────────────────────────────────────────
  rubymine-worker-economy:
    <<: *worker-base
    container_name: rubymine-worker-economy
    command: arq app.workers.economy_worker.WorkerSettings

  # ── Payment Worker ──────────────────────────────────────────────────────────
  rubymine-worker-payment:
    <<: *worker-base
    container_name: rubymine-worker-payment
    command: arq app.workers.payment_worker.WorkerSettings

  # ── Security Worker ─────────────────────────────────────────────────────────
  rubymine-worker-security:
    <<: *worker-base
    container_name: rubymine-worker-security
    command: arq app.workers.security_worker.WorkerSettings

  # ── Creator Worker ──────────────────────────────────────────────────────────
  rubymine-worker-creator:
    <<: *worker-base
    container_name: rubymine-worker-creator
    command: arq app.workers.creator_worker.WorkerSettings

  # ── User Control Worker ─────────────────────────────────────────────────────
  rubymine-worker-user:
    <<: *worker-base
    container_name: rubymine-worker-user
    command: arq app.workers.user_control_worker.WorkerSettings

  # ── Asset Worker ─────────────────────────────────────────────────────────────
  rubymine-worker-assets:
    <<: *worker-base
    container_name: rubymine-worker-assets
    command: arq app.workers.asset_worker.WorkerSettings

  # ── Local Payment Worker ─────────────────────────────────────────────────────
  rubymine-worker-local-payment:
    <<: *worker-base
    container_name: rubymine-worker-local-payment
    command: arq app.workers.local_payment_worker.WorkerSettings

  # ── Notification Worker ──────────────────────────────────────────────────────
  rubymine-worker-notification:
    <<: *worker-base
    container_name: rubymine-worker-notification
    command: arq app.workers.notification_worker.WorkerSettings

  # ── Battle Worker (crash recovery + timer) ───────────────────────────────────
  rubymine-worker-battle:
    <<: *worker-base
    container_name: rubymine-worker-battle
    command: arq app.workers.battle_worker.WorkerSettings

  # ── Battle Cleanup Worker ────────────────────────────────────────────────────
  rubymine-worker-battle-cleanup:
    <<: *worker-base
    container_name: rubymine-worker-battle-cleanup
    command: arq app.workers.battle_cleanup_worker.WorkerSettings

  # ── Cleanup Worker (logs, media, drop feed trim) ─────────────────────────────
  rubymine-worker-cleanup:
    <<: *worker-base
    container_name: rubymine-worker-cleanup
    command: arq app.workers.cleanup_worker.WorkerSettings

  # ── Fake Drop Worker ─────────────────────────────────────────────────────────
  rubymine-worker-fake-drop:
    <<: *worker-base
    container_name: rubymine-worker-fake-drop
    command: arq app.workers.fake_drop_worker.WorkerSettings

  # ── Admin Worker ─────────────────────────────────────────────────────────────
  rubymine-worker-admin:
    <<: *worker-base
    container_name: rubymine-worker-admin
    command: arq app.workers.admin_worker.WorkerSettings

  # ── Telegram Bot ─────────────────────────────────────────────────────────────
  rubymine-worker-bot:
    <<: *worker-base
    container_name: rubymine-worker-bot
    command: python -m app.bot.main
    depends_on:
      rubymine-api:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  uploads:
  logs:

networks:
  rubymine-net:
    driver: bridge
