# docker-compose.prod.yml — Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: "3.9"

services:

  rubymine-postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  rubymine-redis:
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      --save 900 1
      --save 300 10
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  rubymine-api:
    image: ${DOCKER_IMAGE:-rubymine-api}:${VERSION:-latest}
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://rubymine:${POSTGRES_PASSWORD}@rubymine-postgres:5432/rubymine
      REDIS_URL: redis://:${REDIS_PASSWORD}@rubymine-redis:6379/0
      ARQ_REDIS_URL: redis://:${REDIS_PASSWORD}@rubymine-redis:6379/1
      TESTING: "false"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  rubymine-nginx:
    restart: always
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/websocket.conf:/etc/nginx/conf.d/websocket.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - uploads:/app/uploads:ro
      - certbot-www:/var/www/certbot:ro
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  rubymine-worker-economy:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  rubymine-worker-payment:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  rubymine-worker-security:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  rubymine-worker-creator:
    restart: always

  rubymine-worker-user:
    restart: always

  rubymine-worker-assets:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  rubymine-worker-bot:
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  rubymine-backup:
    image: postgres:16-alpine
    container_name: rubymine-backup
    restart: unless-stopped
    depends_on:
      rubymine-postgres:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      BACKUP_DIR: ${BACKUP_DIR:-/backups}
      RETAIN_DAYS: ${RETAIN_DAYS:-7}
    volumes:
      - ./docker/scripts/backup.sh:/scripts/backup.sh:ro
      - ./docker/scripts/backup-entrypoint.sh:/scripts/entrypoint.sh:ro
      - backups-data:/backups
    networks:
      - rubymine-net
    command: ["sh", "/scripts/entrypoint.sh"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  backups-data:
  certbot-www:
