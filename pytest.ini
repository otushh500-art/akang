[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# C-TEST FIX: parallel execution is OPT-IN, not default.
# pytest-xdist worker processes crash on Windows when combined with aiosqlite's
# shared-cache in-memory databases ("node down: Not properly terminated"),
# which produces false failures unrelated to the code under test.
# To run in parallel on a stable platform (Linux/Docker), pass it explicitly:
#   pytest -n auto --dist=loadscope      (or)   pytest -n 4
# Default (no flag) = serial, which is deterministic and matches CI on all OSes.
addopts =
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
